# Dependabot — automated dependency PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Weekly cadence; minor + patch bumps grouped into a single PR per ecosystem to
# keep review load low. Major bumps are kept separate (one PR each) so they can
# be reviewed deliberately.
version: 2

updates:
  # --- Python agent (pip) ---
  - package-ecosystem: "pip"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "agent"
    commit-message:
      prefix: "deps(agent)"
    groups:
      agent-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # --- Next.js UI (pnpm workspace). Dependabot reads npm manifests; the root
  #     manifest + workspaces are covered from the workspace root. ---
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ui"
    commit-message:
      prefix: "deps(ui)"
    groups:
      ui-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # --- GitHub Actions workflows ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
