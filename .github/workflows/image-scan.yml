# Trivy vulnerability scanning.
#   - Filesystem scan: always runs against the agent/ and ui/ source trees on every PR/push.
#   - Image scan:      runs against the two built container images IFF their Dockerfiles exist.
#       service 'agent' -> agent/Dockerfile
#       service 'web'   -> ui/Dockerfile (Next.js standalone)
#     NOTE: the Dockerfiles are owned by the CD/Docker agent and may not exist yet. The image
#     job degrades gracefully (skips a target whose Dockerfile is absent) instead of failing.
# Owned by the SECURITY SCANNING agent. Keep independent of ci-agent.yml / ci-ui.yml / cd.yml.
#
# POLICY: fails the job on HIGH/CRITICAL with a fix available (--exit-code 1, --ignore-unfixed).
# ALLOWLIST: false positives / accepted risk go in .trivyignore at the repo root (one CVE/vuln
#   ID per line with a justification comment). TODO(allowlist): create .trivyignore when the
#   first exception is triaged — owned by this security agent, not created pre-emptively.
name: image-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filesystem-scan:
    name: trivy fs (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: agent
            path: agent
          - name: ui
            path: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Two passes: SARIF (always uploaded, never fails) for the Security tab, then a
      # table pass that enforces the HIGH/CRITICAL gate.
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          format: sarif
          output: trivy-fs-${{ matrix.target.name }}.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          trivyignores: .trivyignore

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: trivy-fs-${{ matrix.target.name }}.sarif
          category: trivy-fs-${{ matrix.target.name }}

      - name: Trivy filesystem scan (gate on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true # only block on advisories that have a fix
          exit-code: "1" # fail the job -> blocking gate
          scanners: vuln,secret,misconfig
          trivyignores: .trivyignore

  image-scan:
    name: trivy image (${{ matrix.target.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        target:
          # Cloud Run service name -> Dockerfile + build context.
          - service: agent
            dockerfile: agent/Dockerfile
            context: agent
          - service: web
            dockerfile: ui/Dockerfile
            context: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The Dockerfiles are owned by the CD/Docker agent and may not exist yet. Detect and skip
      # the remaining steps for this target rather than failing the run.
      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.target.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.dockerfile }} not found; skipping image scan for service '${{ matrix.target.service }}'."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      # Build a local image for scanning only (load into the daemon, do not push).
      # The real tagged build/push (immutable git SHA) is done by cd.yml, owned by another agent.
      - name: Build image (local, scan only)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ${{ matrix.target.context }}
          file: ${{ matrix.target.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.target.service }}:scan
          # The 'web' image is env-agnostic (no NEXT_PUBLIC_API_URL build arg); a
          # scan-only build needs no build args for the dependency/OS layers.

      - name: Trivy image scan (SARIF)
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          scan-type: image
          image-ref: ${{ matrix.target.service }}:scan
          format: sarif
          output: trivy-image-${{ matrix.target.service }}.sarif
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

      - name: Upload SARIF
        if: steps.check.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: trivy-image-${{ matrix.target.service }}.sarif
          category: trivy-image-${{ matrix.target.service }}

      - name: Trivy image scan (gate on HIGH/CRITICAL)
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          scan-type: image
          image-ref: ${{ matrix.target.service }}:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore
