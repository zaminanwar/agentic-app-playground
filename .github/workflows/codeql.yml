# CodeQL static analysis (GitHub Advanced Security).
# Scans both deployables in the monorepo:
#   - ui/    -> javascript-typescript (Next.js, pnpm+turbo workspace)
#   - agent/ -> python (LangGraph server)
# Owned by the SECURITY SCANNING agent. Keep independent of ci-agent.yml / ci-ui.yml / cd.yml.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 07:13 UTC). Off-peak, avoids top-of-hour congestion.
    - cron: "13 7 * * 1"

# Cancel superseded in-progress runs for the same ref to save Actions minutes.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at workflow level; the analyze job widens only what it needs.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      security-events: write # upload SARIF results to the Security tab / code scanning
      actions: read # required for private repos so CodeQL can read workflow run metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            # Restrict analysis to the UI deployable to keep results focused and fast.
            paths: ui
          - language: python
            paths: agent
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          languages: ${{ matrix.language }}
          # 'security-extended' adds higher-recall security queries beyond the default suite.
          # TODO(decision): switch to 'security-and-quality' if the team also wants maintainability
          # findings gated in PRs (noisier). Centralized here, not yet decided.
          queries: security-extended
          config: |
            paths:
              - ${{ matrix.paths }}

      # CodeQL auto-build works for interpreted languages (JS/TS, Python); no compile step needed.
      - name: Autobuild
        uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          category: "/language:${{ matrix.language }}"
