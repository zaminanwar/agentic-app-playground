# Dependency vulnerability audit for both deployables.
#   - agent/ (Python)         -> pip-audit against requirements.txt
#   - ui/    (Next.js, pnpm)  -> pnpm audit
# Owned by the SECURITY SCANNING agent. Keep independent of ci-agent.yml / ci-ui.yml / cd.yml.
#
# POLICY (non-blocking -> blocking ramp):
#   Today these jobs are ADVISORY: they run, surface findings in the job summary, but do NOT
#   fail the PR (continue-on-error: true on the audit step). This avoids blocking the team on
#   transitive advisories with no available fix while the allowlist/triage process beds in.
#   To make them BLOCKING: remove `continue-on-error: true` from the relevant audit step.
#   TODO(decision): pick the date/criteria to flip each job to blocking, and whether to gate on
#   severity (e.g. only fail on HIGH/CRITICAL). Listed in decisions_needed.
name: dependency-audit

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mondays 07:31 UTC) so new advisories on unchanged deps still get caught.
    - cron: "31 7 * * 1"

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit (agent)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      # Audits the resolved dependency tree from requirements.txt.
      # --strict treats warnings (e.g. skipped deps) as errors so silent gaps surface.
      # Allowlist mechanism: append `--ignore-vuln <ID>` (e.g. GHSA-xxxx / PYSEC-xxxx) with a
      # justification comment for advisories with no fix yet.
      # TODO(allowlist): add `--ignore-vuln` entries here as triaged, each with a reason.
      - name: Run pip-audit
        continue-on-error: true # ADVISORY today; remove to make blocking (see header policy).
        run: |
          pip-audit \
            --requirement requirements.txt \
            --strict \
            --desc \
            --format markdown >> "$GITHUB_STEP_SUMMARY"

  ui-audit:
    name: pnpm audit (ui)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.6.3 # keep in sync with ui/package.json "packageManager"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # `pnpm audit` against the whole workspace. --audit-level high reports HIGH/CRITICAL.
      # Allowlist mechanism: pnpm reads `pnpm.auditConfig.ignoreCves` / `ignoreGhsas` from the
      # root package.json (owned by the UI agent, not edited here). Document additions there.
      # OSV-SCANNER ALTERNATIVE: swap this step for google/osv-scanner-action if uniform OSV
      # coverage across both ecosystems is preferred. TODO(decision) in decisions_needed.
      - name: Run pnpm audit
        continue-on-error: true # ADVISORY today; remove to make blocking (see header policy).
        run: |
          pnpm audit --audit-level high | tee -a "$GITHUB_STEP_SUMMARY"
